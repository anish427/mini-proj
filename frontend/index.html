<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepFake Tracker — AI Image & Video Authenticity Analyzer</title>
    <meta name="description" content="DeepFake Tracker uses multi-signal AI analysis to detect deepfakes, AI-generated images, and manipulated media with high accuracy." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <!-- Loading overlay -->
    <div id="loading-overlay" class="overlay" aria-hidden="true">
      <div class="overlay-inner">
        <div class="pulse-ring"></div>
        <div class="spinner" role="status" aria-label="Loading"></div>
        <p class="loading-text">Analyzing with multi-signal detection…</p>
        <p class="loading-sub">Running AI classifier, ELA, metadata & frequency checks</p>
      </div>
    </div>

    <!-- Animated background -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <main>
      <!-- Hero header -->
      <header id="hero">
        <div class="logo-mark">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="url(#g1)" stroke-width="2.5" opacity="0.7"/>
            <path d="M14 20 L18 26 L28 14" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 12 L28 28 M28 12 L12 28" stroke="#f87171" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
            <defs><linearGradient id="g1" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
          </svg>
        </div>
        <h1>DeepFake <span class="accent-text">Tracker</span></h1>
        <div style="position:absolute;top:1.5rem;right:1.5rem;display:flex;gap:.75rem;align-items:center;">
          <a href="/profile" style="color:#8b95b0;font-size:.83rem;font-weight:600;text-decoration:none;padding:.4rem .8rem;border:1px solid rgba(80,96,140,.4);border-radius:8px;transition:color .2s;" onmouseover="this.style.color='#818cf8'" onmouseout="this.style.color='#8b95b0'">My Profile</a>
          <button onclick="localStorage.removeItem('dft_current');window.location.href='/auth'" style="background:none;border:1px solid rgba(80,96,140,.4);color:#8b95b0;border-radius:8px;padding:.4rem .9rem;font-size:.83rem;font-weight:600;cursor:pointer;font-family:inherit;">Sign Out</button>
        </div>
        <!-- <p class="subtitle">Multi-signal AI authenticity analysis — powered by SigLIP-2, ELA, metadata & frequency forensics</p> -->
      </header>

      <!-- Upload area -->
      <section class="upload-section" id="upload-section">
        <label class="dropzone" id="dropzone" for="file-input">
          <input type="file" id="file-input" accept="image/*,video/*" />
          <div class="dropzone-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <path d="M24 32V16M24 16L18 22M24 16L30 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 32L8 34C8 37.3137 10.6863 40 14 40L34 40C37.3137 40 40 37.3137 40 34V32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <strong>Drop a file here or click to browse</strong>
          <span class="file-types">Images: JPG, PNG, WebP </span>
        </label>
        <div class="actions">
          <button type="button" class="btn-analyze" id="analyze-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            Analyze
          </button>
        </div>
      </section>

      <!-- Results panel -->
      <section class="panel" id="panel">
        <!-- Preview card -->
        <div class="card" id="preview-card">
          <div class="card-header">
            <h2>Preview</h2>
          </div>
          <div class="preview-wrap" id="preview">
            <div class="preview-placeholder" id="preview-placeholder">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none" opacity="0.3">
                <rect x="8" y="8" width="48" height="48" rx="8" stroke="currentColor" stroke-width="2"/>
                <circle cx="22" cy="24" r="5" stroke="currentColor" stroke-width="2"/>
                <path d="M8 44L20 32L32 44L44 28L56 44" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
              <span>No file selected</span>
            </div>
            <img id="preview-img" alt="Preview" hidden />
            <video id="preview-video" controls playsinline hidden></video>
          </div>
        </div>

        <!-- Result card -->
        <div class="card" id="result-card">
          <div class="card-header">
            <h2>Analysis Result</h2>
          </div>
          <div id="result-area">
            <div class="result-empty">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" opacity="0.3">
                <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/>
                <path d="M24 14V26M24 32V34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>Upload a file and click Analyze</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Forensic details (populated by JS) -->
      <section class="forensics-section" id="forensics-section" hidden>
        <div class="card forensics-card">
          <div class="card-header">
            <h2>Forensic Signal Breakdown</h2>
          </div>
          <div id="forensics-grid" class="forensics-grid"></div>
        </div>
      </section>

      <!-- Footer -->
      <footer>
        <p>DeepFake Tracker · Multi-signal AI detection engine</p>
      </footer>
    </main>

    <script src="/static/app.js"></script>
    <script>
      if (!localStorage.getItem('dft_current')) {
        window.location.href = '/auth';
      }
    </script>
  </body>
</html>
